<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dollab — Админка</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900;1000&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="adminstyles.css">
  <script src="app1.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  
  <div class="admin-page">


    <header class="admin-topbar">

    <div
      class="admin-logo"
      onclick="
        history.pushState({}, '', 'adminpage.html');
        renderAdminDashboard();
      "
      title="Главная"
    >
      <img src="/icons/dllogo_small.png" alt="">
    </div>

      <div class="admin-topbar-center">

        <button class="admin-topbar-btn active" id="adminDollopediaBtn">
            <img src="/icons/book-heart.svg" alt="">
        </button>

        <button class="admin-topbar-btn" id="adminCategoriesBtn">
          <img src="/icons/3lines.svg" alt="">
        </button>

        <button
          class="admin-topbar-btn"
          onclick="navigateAdminTo('user-requests')"
          title="Заявки пользователей"
        >
          <img src="/icons/note.svg" alt="">
        </button>

      </div>

      <button
        class="admin-topbar-btn"
        onclick="logout()"
      >
        <img src="/icons/logout.svg" alt="">
      </button>

    </header>


<main class="admin-content" id="adminContent">

      <section class="admin-stats-grid">

<div class="admin-stat-card" onclick="navigateAdminTo('users')">
  <div class="admin-stat-icon">
    <img src="/icons/users.svg" alt="">
  </div>

  <div class="admin-stat-info">
    <span>Пользователи</span>
    <h2 id="adminUsersCount">0</h2>
  </div>
</div>

<div class="admin-stat-card" onclick="navigateAdminTo('posts')">
  <div class="admin-stat-icon">
    <img src="/icons/posts.svg" alt="">
  </div>

  <div class="admin-stat-info">
    <span>Посты</span>
    <h2 id="adminPostsCount">0</h2>
  </div>
</div>

<div class="admin-stat-card" onclick="navigateAdminTo('product-ads')">
  <div class="admin-stat-icon">
    <img src="/icons/shopping-bag.svg" alt="">
  </div>

  <div class="admin-stat-info">
    <span>Объявления</span>
<h2 id="adminAdsCount">0</h2>
  </div>
</div>

<div class="admin-stat-card" onclick="navigateAdminTo('reports')">
  <div class="admin-stat-icon">
    <img src="/icons/flag.svg" alt="">
  </div>

  <div class="admin-stat-info">
    <span>Жалобы</span>
    <h2 id="adminReportsCount">0</h2>
  </div>
</div>

      </section>


<section class="admin-middle-layout">
  <div class="admin-chart-card">
  <h3>Активность по датам</h3>

  <div class="admin-chart-container">
    <canvas id="adminActivityChart"></canvas>
  </div>
</div>

  <div class="admin-reports-card">
    <div class="admin-card-header">
      <h3>Активные жалобы</h3>
      <button onclick="navigateAdminTo('reports')">Смотреть все</button>
    </div>

    <div class="admin-active-reports-list" id="adminActiveReportsList"></div>
  </div>
</section>


      <section class="admin-requests-card">

        <div class="admin-card-header">
          <h3>Заявки пользователей</h3>
          <button onclick="navigateAdminTo('user-requests')">
            Смотреть все
          </button>
        </div>

        <table class="admin-table">

          <thead>
            <tr>
              <th>Кто отправил</th>
              <th>Тип заявки</th>
              <th>Описание</th>
              <th>Дата</th>
              <th>Статус</th>
            </tr>
          </thead>

          <tbody id="adminUserRequestsPreviewBody"></tbody>

        </table>

      </section>

    </main>

  </div>

<script src="adminAPI.js"></script>
<script src="admin.js"></script>

</body>
</html>
