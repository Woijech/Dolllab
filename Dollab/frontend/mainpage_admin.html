<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dollab — Куклопедия</title>
  <!-- Подключаем шрифты как в странице авторизации -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  
  <style>
    /* Сброс стилей как в странице авторизации */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --pink-main: #ff67a6;
      --pink-light: #ff8abb;
      --pink-pale: #ffbcd8;
      --pink-bg: #ffd1e9;
      --white: #ffffff;
      --text-dark: #6b3a4a;
    }

    body {
      font-family: 'Lobster', cursive;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: radial-gradient(circle, #ffffff 0%, #ffe3f4 90%);
      color: var(--text-dark);
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* Sidebar - исправленные пропорции */
    .sidebar {
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px); /* Высота минус отступы сверху и снизу */
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 4px 0 20px rgba(255, 183, 213, 0.25);
      border: 1px solid rgba(255, 209, 227, 0.5);
      overflow-y: auto;
      margin: 20px 0 20px 20px;
      display: flex;
      flex-direction: column;
    }

    /* Логотип картинкой */
    .logo {
      text-align: center;
      margin-bottom: 100px;
      flex-shrink: 0;
    }

    .logo-img {
      width: 230px; /* Фиксированная ширина */
      height: auto;
      max-width: 100%;
      display: block;
      margin: 0 auto;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-grow: 1;
      justify-content: flex-start;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.7);
      /* border: 1px solid var(--pink-main); */
      font-size: 26px;
      color: var(--pink-main);
      flex-shrink: 0;
    }

    .menu-item:hover {
      background: var(--pink-main);
      transform: translateX(5px);
      color: var(--white);
      border-color: var(--pink-main);
    }

    .menu-item.active {
      background: var(--pink-main);
      color: var(--white);
      border-color: var(--pink-main);
      box-shadow: 0 6px 20px rgba(255, 103, 166, 0.3);
      transform: translateX(5px);
    }

    .icon {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Иконки - изначально цвета #ff67a6 */
    .icon-img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      transition: all 0.3s ease;
    }

    /* Иконки становятся белыми при наведении и в активном состоянии */
    .menu-item:hover .icon-img,
    .menu-item.active .icon-img {
      filter: brightness(0) invert(1); /* Белый цвет */
    }

    /* Main content - добавлена позиция relative для аватарки */
    .main {
      padding: 40px;
      position: relative;
    }

    /* Аватарка профиля в правом верхнем углу */
    .profile-avatar {
      position: absolute;
      top: 40px;
      right: 40px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      /* Сияние по краям вместо обычной тени */
      /* box-shadow:  */
        /* 0 0 0 2px rgba(255, 103, 166, 0.2), 
        0 0 0 4px rgba(255, 103, 166, 0.1),
        0 0 0 6px rgba(255, 103, 166, 0.05), 
        0 4px 12px rgba(255, 103, 166, 0.3);  */
      border: 1px solid var(--pink-pale);
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      overflow: hidden;
    }

    .profile-avatar:hover {
      transform: scale(1.1);
      /* Усиленное сияние при наведении */
      box-shadow: 
        0 0 0 3px rgba(255, 103, 166, 0.3),
        0 0 0 6px rgba(255, 103, 166, 0.2),
        0 0 0 9px rgba(255, 103, 166, 0.1),
        0 6px 20px rgba(255, 103, 166, 0.3);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Иконка пользователя внутри аватарки (если нет картинки) */
    .avatar-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 28px;
    }

    /* Search - стили как поля ввода в авторизации */
    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 35px;
      padding: 12px 25px;
      box-shadow: 0 8px 30px rgba(255, 183, 213, 0.25);
      margin-bottom: 35px;
      max-width: 750px;
      border: 1px solid var(--pink-light);
      transition: all 0.3s ease;
    }

    .search-bar:focus-within {
      box-shadow: 0 12px 40px rgba(255, 103, 166, 0.3);
      transform: translateY(-2px);
    }

    .search-bar input {
      border: none;
      outline: none;
      flex: 1;
      font-family: 'Lobster', cursive;
      font-size: 24px;
      padding: 0 20px;
      background: transparent;
      color: var(--pink-main);
    }

    .search-bar input::placeholder {
      color: var(--pink-pale);
    }

    .search-icon,
    .clear-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Иконки поиска - цвет #ff67a6 */
    .search-icon img{
      width: 30px;
      height: 30px;
      object-fit: contain;
    }
    .clear-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .clear-icon:hover {
      transform: rotate(90deg);
    }

    /* Filters - стили как кнопки в авторизации */
    .filters {
      display: flex;
      gap: 18px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter {
      background: var(--pink-main);
      border: none;
      border-radius: 25px;
      padding: 12px 24px;
      font-family: 'Lobster', cursive;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 103, 166, 0.3);
      color: var(--white);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter:hover {
      background: #f73385;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 103, 166, 0.4);
    }

    .filter:active {
      transform: translateY(0);
    }

    /* Кнопка "Добавить куклу" - в том же стиле что и фильтры */
    .add-doll-btn {
      background: var(--pink-main);
      border: none;
      border-radius: 25px;
      padding: 12px 24px;
      font-family: 'Lobster', cursive;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 103, 166, 0.3);
      color: var(--white);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .add-doll-btn:hover {
      background: linear-gradient(135deg, #f73385, #e62a78);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 103, 166, 0.4);
    }

    .add-doll-btn:active {
      transform: translateY(0);
    }

    .add-doll-icon {
      width: 22px;
      height: 22px;
      filter: brightness(0) invert(1);
    }

    /* Catalog grid - 4 карточки в ширину */
    .catalog {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Card - убрана верхняя полоска */
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--pink-pale);
      border-radius: 25px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(255, 183, 213, 0.25);
      transition: all 0.3s ease;
      overflow: hidden;
    }
    
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(255, 103, 166, 0.3);
      border-color: #f73385;
    }

    .card img {
      width: 100%;
      height: 280px;
      border-radius: 18px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 103, 166, 0.2);
      object-fit: cover;
    }

    .card-title {
      font-family: 'Lobster', cursive;
      font-weight: 400;
      font-size: 22px;
      margin: 10px 0 5px;
      color: var(--pink-main);
    }

    .card-subtitle {
      font-family: 'Lobster', cursive;
      font-size: 18px;
      color: var(--pink-light);
    }

    /* Стили для скроллбара в сайдбаре */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    
    .sidebar::-webkit-scrollbar-track {
      background: rgba(255, 215, 235, 0.3);
      border-radius: 10px;
    }
    
    .sidebar::-webkit-scrollbar-thumb {
      background: var(--pink-main);
      border-radius: 10px;
    }
    
    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #f73385;
    }
    

    /* Адаптивность */
    @media (max-width: 1400px) {
      .catalog {
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
      }
    }

    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 250px 1fr;
      }
      
      .sidebar {
        width: 250px;
        margin-left: 15px;
      }
      
      .logo-img {
        width: 180px;
      }
      
      .catalog {
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
      }
      
      .profile-avatar {
        width: 55px;
        height: 55px;
      }
    }

    @media (max-width: 1024px) {
      .app {
        grid-template-columns: 230px 1fr;
      }
      
      .sidebar {
        width: 230px;
        margin-left: 15px;
      }
      
      .logo-img {
        width: 160px;
      }
      
      .menu-item {
        padding: 10px 14px;
        font-size: 18px;
      }
      
      .icon {
        width: 24px;
        height: 24px;
      }
      
      .icon-img {
        width: 18px;
        height: 18px;
      }
      
      .profile-avatar {
        width: 50px;
        height: 50px;
        top: 35px;
        right: 35px;
      }
      
      .add-doll-btn {
        font-size: 18px;
        padding: 10px 20px;
      }
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      
      .sidebar {
        position: relative;
        width: calc(100% - 40px);
        height: auto;
        max-height: none;
        margin: 20px auto;
        padding: 20px;
      }
      
      .logo-img {
        width: 150px;
      }
      
      .menu {
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 0;
        justify-content: flex-start;
      }
      
      .menu-item {
        flex-direction: column;
        min-width: 100px;
        text-align: center;
        padding: 12px;
        gap: 8px;
      }
      
      .menu-item:hover,
      .menu-item.active {
        transform: translateY(-5px);
      }
      
      .main {
        padding: 25px;
      }
      
      .catalog {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      
      .profile-avatar {
        top: 25px;
        right: 25px;
        width: 50px;
        height: 50px;
      }
      
      .filters {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .add-doll-btn {
        margin-left: 0;
        margin-top: 10px;
        align-self: flex-start;
      }
    }

    @media (max-width: 600px) {
      .catalog {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .logo-img {
        width: 130px;
      }
      
      .search-bar {
        max-width: 100%;
      }
      
      .profile-avatar {
        width: 45px;
        height: 45px;
      }
    }

    @media (max-width: 480px) {
      .search-bar input {
        font-size: 20px;
      }
      
      .filter {
        font-size: 18px;
        padding: 10px 18px;
      }
      
      .add-doll-btn {
        font-size: 16px;
        padding: 8px 16px;
      }
      
      .card-title {
        font-size: 20px;
      }
      
      .card-subtitle {
        font-size: 16px;
      }
      
      .menu-item {
        font-size: 16px;
        padding: 10px;
        min-width: 90px;
      }
      
      .icon {
        width: 22px;
        height: 22px;
      }
      
      .icon-img {
        width: 16px;
        height: 16px;
      }
      
      .logo-img {
        width: 120px;
      }
      
      .profile-avatar {
        width: 40px;
        height: 40px;
        top: 20px;
        right: 20px;
      }
      
      .add-doll-icon {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <!-- Логотип картинкой -->
      <div class="logo">
        <img src="icons/dllogo.png" alt="Dollab" class="logo-img">
      </div>
      <nav class="menu">
        <div class="menu-item">
          <div class="icon">
            <img src="icons/home.svg" alt="Главная" class="icon-img">
          </div>
          Главная
        </div>
        <div class="menu-item">
          <div class="icon">
            <img src="icons/mdi_envelope-heart-outline.svg" alt="Сообщения" class="icon-img">
          </div>
          Сообщения
        </div>
        <div class="menu-item">
          <div class="icon">
            <img src="icons/fa6-solid_compass.svg" alt="Интересное" class="icon-img">
          </div>
          Интересное
        </div>
        <div class="menu-item">
          <div class="icon">
            <img src="icons/heart_outline.svg" alt="Уведомления" class="icon-img">
          </div>
          Уведомления
        </div>
        <div class="menu-item">
          <div class="icon">
            <img src="icons/twemoji_plus.svg" alt="Создать" class="icon-img">
          </div>
          Создать
        </div>
        <div class="menu-item active">
          <div class="icon">
            <img src="icons/bxs_book-heart.svg" alt="Куклопедия" class="icon-img">
          </div>
          Куклопедия
        </div>
        <div class="menu-item">
          <div class="icon">
            <img src="icons/el_shopping-cart.svg" alt="Магазин" class="icon-img">
          </div>
          Магазин
        </div>
      </nav>
    </aside>

    <main class="main">
      <!-- Аватарка профиля в правом верхнем углу -->
      <div class="profile-avatar" id="profileAvatar">
        <!-- Вариант 1: Если есть картинка аватарки -->
        <!-- <img src="profile.jpg" alt="Профиль"> -->
        
        <!-- Вариант 2: Если нет картинки - иконка пользователя -->
        <!-- <div class="avatar-icon">👤</div> -->
      </div>

      <div class="search-bar">
        <span class="search-icon">
          <img src="icons/bi_search-heart-fill.svg" alt="Поиск" class="icon-img">
        </span>
        <input type="text" placeholder="Поиск кукол…" />
        <span class="clear-icon">
          <img src="icons/qlementine-icons_cross-filled-16.svg" alt="Очистить" class="icon-img">
        </span>
      </div>

      <div class="filters">
        <button class="filter">Бренд ▾</button>
        <button class="filter">Год выпуска ▾</button>
        <button class="filter">Персонаж ▾</button>
        <button class="filter">Серия ▾</button>
        <!-- Кнопка "Добавить куклу" -->
        <button class="add-doll-btn" id="addDollBtn">
          <img src="icons/twemoji_plus.svg" alt="Добавить" class="add-doll-icon">
          Добавить куклу
        </button>
      </div>

      <section class="catalog">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Кукла" />
          <div class="card-title">Рошель Гойл</div>
          <div class="card-subtitle">База</div>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Кукла" />
          <div class="card-title">Рошель Гойл</div>
          <div class="card-subtitle">База</div>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Кукла" />
          <div class="card-title">Рошель Гойл</div>
          <div class="card-subtitle">База</div>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Кукла" />
          <div class="card-title">Рошель Гойл</div>
          <div class="card-subtitle">База</div>
        </div>
        <div class="card">
          <img src="https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Кукла" />
          <div class="card-title">Рошель Гойл</div>
          <div class="card-subtitle">База</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Простой скрипт для аватарки профиля
    document.getElementById('profileAvatar').addEventListener('click', function() {
      alert('Профиль пользователя\nЗдесь можно добавить меню настроек профиля');
    });
    
    // Скрипт для кнопки "Добавить куклу"
    document.getElementById('addDollBtn').addEventListener('click', function() {
      alert('Добавить новую куклу\nОткрывается форма добавления новой куклы в коллекцию');
    });
  </script>
</body>
</html>
