<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | DollLab</title>
    
     <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900;1000&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/icons/dllogo_small.png">
  <script src="login.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pacifio';
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            transition: opacity 0.5s ease;
        }

        .bg-normal {
            background:
                radial-gradient(circle at 50% 58%,
                    #ff75b8 0%,
                    #ff8fc8 26%,
                    #ffb2d8 50%,
                    #f7d9f1 72%,
                    #fff3fa 100%
                );
            opacity: 1;
        }

        .bg-inverted {
            background:
                radial-gradient(circle at 48% 42%,
                    #fff3fa 0%,
                    #f8d6ef 24%,
                    #ffadd5 50%,
                    #ff8ac3 74%,
                    #ff6fb2 100%
                );
            opacity: 0;
        }
        .background::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;

            background:
                radial-gradient(circle at 50% 82%,
                    rgba(255, 107, 178, 0.32) 0%,
                    rgba(255, 150, 205, 0.22) 32%,
                    transparent 62%
                ),
                radial-gradient(circle at 82% 22%,
                    rgba(255, 255, 255, 0.45) 0%,
                    transparent 24%
                ),
                radial-gradient(circle at 18% 20%,
                    rgba(255, 180, 220, 0.28) 0%,
                    transparent 34%
                );

            filter: blur(16px);
            opacity: 0.85;
        }
        .background::before {
            content: "";
            position: absolute;
            inset: -15%;
            z-index: 2;

            background:
                radial-gradient(ellipse at 30% 25%,
                    rgba(255, 255, 255, 0.55) 0%,
                    rgba(255, 255, 255, 0.24) 12%,
                    transparent 32%
                ),
                radial-gradient(ellipse at 70% 35%,
                    rgba(255, 255, 255, 0.42) 0%,
                    rgba(255, 255, 255, 0.2) 10%,
                    transparent 28%
                ),
                radial-gradient(ellipse at 58% 78%,
                    rgba(255, 255, 255, 0.3) 0%,
                    rgba(255, 198, 232, 0.18) 18%,
                    transparent 42%
                );

            filter: blur(20px);
            opacity: 0.75;
        }

        body.register-mode .bg-normal {
            opacity: 0;
        }

        body.register-mode .bg-inverted {
            opacity: 1;
        }

        .sparkle-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            z-index: 4;
            opacity: 0.85;

            mix-blend-mode: screen;
            filter: brightness(1.45) contrast(1.2) saturate(1.05);

            pointer-events: none;
        }
        
        body.register-mode .bg-gradient:first-child {
            opacity: 0;
        }
        
        body.register-mode .bg-gradient.inverted {
            opacity: 1;
        }
        
        .login-container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .login-form, .register-form {
            background: #ffffff00;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .login-form {
            opacity: 1;
        }
        
        .register-form {
            opacity: 0;
            pointer-events: none;
        }
        
        .login-form.hiding {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
            pointer-events: none;
        }
        
        .register-form.showing {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }
        
        .input-group {
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .form-input {
            width: 450px;
            height: 55px;
            padding: 0 30px;
            border-radius: 30px;
            border: 1px #ff67a6;
            font-family: "Nunito";
            font-size: 25px;
            font-weight: 700;
            color: #ff8abb;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: block;
        }
        
        .password-wrapper {
            position: relative;
            width: 450px;
            margin-top: 20px;
        }
        
        .password-wrapper .form-input {
            width: 100%;
            margin: 0;
            padding-right: 60px;
        }
        
        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #ff67a6;
            font-size: 24px;
            transition: all 0.3s ease;
            user-select: none;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-password:hover {
            color: #f73385;
            transform: translateY(-50%) scale(1.1);
        }
        
        .eye-icon,
        .eye-slash-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        .eye-slash-icon {
            display: none;
        }
        
        .password-wrapper.show-password .eye-icon {
            display: none;
        }
        
        .password-wrapper.show-password .eye-slash-icon {
            display: block;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #ffffff;
        }
        
        .form-input::placeholder {
            color: #ffbcd8;
        }
        
        
        .btn {
            width: 100%;
            max-width: 330px;
            height: 55px;
            border-radius: 30px;
            font-family: "Nunito";
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            padding: 5px;
            letter-spacing: -1px;
        }
        
        .btn-login, .btn-register {
            background-color: #f733857c;
            color: #ffffff;
            border: none;
            margin-bottom: 15px;
            margin-top: 10px;
            font-size: 30px;
            box-shadow:
                0 0 18px rgba(255, 255, 255, 0.35)

            backdrop-filter: blur(6px);
        }
        
        .btn-login:hover, .btn-register:hover {
            background-color: #f733856c;
            transform: translateY(-2px);
            box-shadow:
                0 0 14px rgba(255, 255, 255, 0.65),
                0 0 24px rgba(255, 147, 244, 0.35);
        }
        
        .btn-login:active, .btn-register:active {
            transform: translateY(0);
        }
        
        .btn-signup, .btn-back {
            background-color: transparent;
            color: #ff67a6;
            font-size: 25px;
            background-color: #ffd1fc52;
            border: 1.5px solid #ffffff;
        }
        
        .btn-signup:hover, .btn-back:hover {
            transform: translateY(-2px);
            box-shadow:
                0 0 14px rgba(255, 255, 255, 0.65),
                0 0 24px rgba(255, 147, 244, 0.35);
        }
        
        .btn-signup:active, .btn-back:active {
            transform: translateY(0);
        }
        
        .btn:focus,
        .form-input:focus {
            outline: none;
            box-shadow: 0 0 14px rgba(255, 103, 166, 0.65);
            transform: scale(1.03);
        }
        
        @media (max-width: 768px) {
            .login-header h1 {
                font-size: 80px;
            }
            
            .login-form, .register-form {
                padding: 30px 20px;
            }
            
            .form-input,
            .btn,
            .forgot-password,
            .password-wrapper {
                max-width: 100%;
                width: 100%;
            }
            
            .password-wrapper {
                width: 100%;
            }
            
            .forgot-password {
                padding-right: 10px;
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .login-header h1 {
                font-size: 60px;
                margin-bottom: 20px;
                margin-top: 20px;
            }
            
            .login-form, .register-form {
                padding: 20px 15px;
            }
            
            .form-input {
                font-size: 18px;
                height: 45px;
            }
            
            .toggle-password {
                font-size: 20px;
                right: 15px;
            }
            
            .btn {
                font-size: 20px;
                height: 45px;
            }
            
            .btn-login, .btn-register {
                font-size: 22px;
            }
            
            .btn-signup, .btn-back {
                font-size: 20px;
            }
            
            .forgot-password {
                font-size: 15px;
                margin-top: 8px;
                margin-bottom: 15px;
            }
        }
        
        @media (max-width: 360px) {
            .login-header h1 {
                font-size: 50px;
            }
            
            .login-form, .register-form {
                padding: 15px 10px;
            }
            
            .forgot-password {
                font-size: 14px;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-form, .register-form {
            animation: fadeIn 0.5s ease-out;
        }

        .app-logo {
            width: 500px;
            max-width: 80vw;
            height: auto;
            margin-right: 60px;
            margin-top: 10px;

            display: block;

            transition: opacity 0.4s ease, transform 0.4s ease;

            filter: drop-shadow(0 8px 18px rgba(255, 103, 166, 0.25));
        }
        .input-spacer {
            width: 450px;
            height: 55px;
            margin-top: 38px;
            visibility: hidden;
            pointer-events: none;
        }

        .toast-container {
  position: fixed;
  top: 30px;
  left: 50%;

  transform: translateX(-50%);

  z-index: 99999;
}

.custom-toast {
  min-width: 320px;
  max-width: 500px;

  padding: 16px 22px;

  border-radius: 20px;

  background: rgba(255,255,255,0.95);

  color: #F73385;

  font-family: "Nunito", sans-serif;
  font-size: 15px;
  font-weight: 800;

  text-align: center;

  border: 2px solid rgba(247, 51, 133, 0.2);

  box-shadow:
    0 12px 30px rgba(247, 51, 133, 0.18),
    0 0 0 1px rgba(247, 51, 133, 0.08);

  backdrop-filter: blur(10px);

  animation: toastIn 0.25s ease;
}

.custom-toast.error {
  color: #ff4d6d;
}

.custom-toast.hide {
  animation: toastOut 0.25s ease forwards;
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateY(-15px) scale(0.95);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes toastOut {
  to {
    opacity: 0;
    transform: translateY(-15px) scale(0.95);
  }
}
    </style>
</head>
<body>
<div class="background">
    <div class="bg-gradient bg-normal"></div>
    <div class="bg-gradient bg-inverted"></div>

    <video class="sparkle-video" autoplay muted loop playsinline>
        <source src="icons/glitter.webm" type="video/webm">
    </video>
</div>

    
    <div class="login-container">
        <header class="login-header">
            <img 
                src="icons/dllogonew.png" 
                alt="Dollab" 
                id="mainTitle" 
                class="app-logo"
            >
        </header>
        
        <main style="position: relative; width: 100%; height: 500px;">
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-input" 
                        id="login-username"
                        placeholder="Имя пользователя или email" 
                        aria-label="Имя пользователя или email"
                        required
                    >
                    
                    <div class="password-wrapper" id="passwordWrapper">
                        <input 
                            type="password" 
                            class="form-input" 
                            id="login-password"
                            placeholder="Пароль" 
                            aria-label="Пароль"
                            required
                        >
                        <span class="toggle-password" id="togglePassword" aria-label="Показать пароль" role="button" tabindex="0">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                            <svg class="eye-slash-icon" viewBox="0 0 24 24">
                                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                            </svg>
                        </span>
                    </div>
                    <div class="form-input input-spacer" aria-hidden="true"></div>

                </div>
                
                <button type="button" class="btn btn-login" onclick="login()" aria-label="Войти в аккаунт">
                    Войти
                </button>
                
                <button type="button" class="btn btn-signup" onclick="showRegisterForm()" aria-label="Создать новый аккаунт">
                    Создать новый аккаунт
                </button>
            </form>
            
            <form class="register-form" id="registerForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-input" 
                        id="username"
                        placeholder="Логин" 
                        aria-label="Логин"
                        required
                    >
                    
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email"
                        placeholder="Email" 
                        aria-label="Email"
                        required
                    >
                    
                    <div class="password-wrapper" id="registerPasswordWrapper">
                        <input 
                            type="password" 
                            class="form-input" 
                            id="password"
                            placeholder="Пароль" 
                            aria-label="Пароль"
                            required
                        >
                        <span class="toggle-password" id="toggleRegisterPassword" aria-label="Показать пароль" role="button" tabindex="0">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                            <svg class="eye-slash-icon" viewBox="0 0 24 24">
                                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                            </svg>
                        </span>
                    </div>
                    
                    <div class="forgot-password" style="visibility: hidden; height: 18px;">
                        &nbsp;
                    </div>
                </div>
                
                <button type="button" class="btn btn-register" onclick="register()" aria-label="Зарегистрироваться">
                    Зарегистрироваться
                </button>
                
                <button type="button" class="btn btn-back" onclick="showLoginForm()" aria-label="Вернуться ко входу">
                    Вернуться ко входу
                </button>
            </form>
        </main>
    </div>

    <script>
        function toggleRegisterPasswordVisibility() {
            const passwordWrapper = document.getElementById('registerPasswordWrapper');
            const passwordInput = document.getElementById('password');
            const toggleButton = document.getElementById('toggleRegisterPassword');
            
            if (!passwordWrapper || !passwordInput || !toggleButton) {
                console.error('Элементы для переключения пароля в форме регистрации не найдены');
                return;
            }
            
            if (passwordWrapper.classList.contains('show-password')) {
                passwordInput.type = 'password';
                passwordWrapper.classList.remove('show-password');
                toggleButton.setAttribute('aria-label', 'Показать пароль');
            } else {
                passwordInput.type = 'text';
                passwordWrapper.classList.add('show-password');
                toggleButton.setAttribute('aria-label', 'Скрыть пароль');
            }
        }
        
        function showRegisterForm() {
            const body = document.body;
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const mainTitle = document.getElementById('mainTitle');
            
            body.classList.add('register-mode');
            
            mainTitle.style.opacity = '0';
            mainTitle.style.transform = 'translateY(-20px)';
            
            loginForm.classList.add('hiding');
            
            setTimeout(() => {
                mainTitle.textContent = 'Добро пожаловать в DollLab';
                mainTitle.style.opacity = '1';
                mainTitle.style.transform = 'translateY(0)';
                
                registerForm.classList.add('showing');
            }, 400);
        }
        
        function showLoginForm() {
            const body = document.body;
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const mainTitle = document.getElementById('mainTitle');
            
            body.classList.remove('register-mode');
            
            mainTitle.style.opacity = '0';
            mainTitle.style.transform = 'translateY(-20px)';
            
            registerForm.classList.remove('showing');
            
            setTimeout(() => {
                mainTitle.textContent = 'Добро пожаловать DollLab';
                mainTitle.style.opacity = '1';
                mainTitle.style.transform = 'translateY(0)';
                
                loginForm.classList.remove('hiding');
            }, 400);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const toggleRegisterPassword = document.getElementById('toggleRegisterPassword');
            const registerPasswordInput = document.getElementById('password');
            const registerUsernameInput = document.getElementById('username');
            const registerEmailInput = document.getElementById('email');
            
            if (toggleRegisterPassword) {
                toggleRegisterPassword.addEventListener('click', toggleRegisterPasswordVisibility);
                
                toggleRegisterPassword.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        toggleRegisterPasswordVisibility();
                    }
                });
            }
            
            if (registerUsernameInput) {
                registerUsernameInput.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        if (window.register) {
                            window.register();
                        }
                    }
                });
            }
            
            if (registerEmailInput) {
                registerEmailInput.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        if (window.register) {
                            window.register();
                        }
                    }
                });
            }
            
            if (registerPasswordInput) {
                registerPasswordInput.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        if (window.register) {
                            window.register();
                        }
                    }
                });
            }
            
            window.signup = showRegisterForm;
        });
        
        window.toggleRegisterPasswordVisibility = toggleRegisterPasswordVisibility;
        window.showRegisterForm = showRegisterForm;
        window.showLoginForm = showLoginForm;
    </script>
</body>
</html>
